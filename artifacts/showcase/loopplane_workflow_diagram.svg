<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1060" viewBox="0 0 1400 1060" role="img" aria-label="LoopPlane plan-centered agent loop diagram">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.07"/>
    </pattern>
    <linearGradient id="loopStroke" x1="392" y1="202" x2="1152" y2="678" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.5" stop-color="#39ff88"/>
      <stop offset="1" stop-color="#ff4fd8"/>
    </linearGradient>
    <linearGradient id="planStroke" x1="650" y1="362" x2="870" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#39ff88"/>
    </linearGradient>
    <marker id="arrowCyan" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 14 7 0 14 4 7Z" fill="#5ee7f8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 14 7 0 14 4 7Z" fill="#39ff88"/>
    </marker>
    <marker id="arrowMagenta" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 14 7 0 14 4 7Z" fill="#ff4fd8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 14 7 0 14 4 7Z" fill="#a78bfa"/>
    </marker>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.95 0 0 0 0 1 0 0 0 0.22 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: #07111f; }
      .panel { fill: #0b1323; stroke: #26344d; stroke-width: 1.6; }
      .loop-frame { fill: none; stroke: url(#loopStroke); stroke-width: 2.4; stroke-dasharray: 12 10; opacity: 0.9; }
      .title { fill: #f8fafc; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 38px; font-weight: 700; letter-spacing: 0; }
      .eyebrow { fill: #7dd3fc; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.7px; }
      .section { fill: #93c5fd; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.4px; }
      .node-title { fill: #f8fafc; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 21px; font-weight: 700; letter-spacing: 0; }
      .path-title { fill: #f8fafc; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 19px; font-weight: 700; letter-spacing: 0; }
      .plan-title { fill: #f8fafc; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 30px; font-weight: 800; letter-spacing: 0; }
      .node-text { fill: #b9c7dc; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 15px; font-weight: 400; letter-spacing: 0; }
      .small { fill: #9fb0c9; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 13px; font-weight: 400; letter-spacing: 0; }
      .label { fill: #c4b5fd; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0; }
      .gap-label { fill: #f0abfc; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0; }
      .expand-label { fill: #99f6e4; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0; }
      .entry { fill: #071f21; stroke: #2dd4bf; stroke-width: 2; }
      .plan { fill: #121827; stroke: url(#planStroke); stroke-width: 3; }
      .work { fill: #0e1828; stroke: #38bdf8; stroke-width: 2; }
      .gate { fill: #171329; stroke: #ff4fd8; stroke-width: 2; }
      .expand { fill: #0d2119; stroke: #39ff88; stroke-width: 2; }
      .complete { fill: #14132b; stroke: #a78bfa; stroke-width: 2; }
      .surface { fill: #101827; stroke: #a3e635; stroke-width: 1.8; }
      .note { fill: #111827; stroke: #2b3c59; stroke-width: 1.5; }
      .path-panel { fill: #0b1323; stroke: #26344d; stroke-width: 1.4; }
      .path-node { fill: #101827; stroke: #38bdf8; stroke-width: 1.8; }
      .path-agent { fill: #0d2119; stroke: #39ff88; stroke-width: 1.8; }
      .path-review { fill: #171329; stroke: #a78bfa; stroke-width: 1.8; }
      .path-watch { fill: #101827; stroke: #a3e635; stroke-width: 1.8; }
      .edge { fill: none; stroke: #5ee7f8; stroke-width: 3; marker-end: url(#arrowCyan); }
      .gap-edge { fill: none; stroke: #ff4fd8; stroke-width: 3; marker-end: url(#arrowMagenta); }
      .expand-edge { fill: none; stroke: #39ff88; stroke-width: 3; marker-end: url(#arrowGreen); }
      .exit-edge { fill: none; stroke: #a78bfa; stroke-width: 3; marker-end: url(#arrowPurple); }
      .review-edge { fill: none; stroke: #7fb6c9; stroke-width: 2.1; stroke-dasharray: 6 7; marker-end: url(#arrowCyan); opacity: 0.7; }
      .chip { fill: #052f2e; stroke: #2dd4bf; stroke-width: 1.2; }
      .chip-text { fill: #99f6e4; font-family: "Liberation Sans", "DejaVu Sans", sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="1060"/>
  <rect width="1400" height="1060" fill="url(#grid)" opacity="0.92"/>

  <text x="70" y="68" class="eyebrow">LOOPPLANE AGENT WORKFLOW</text>
  <text x="70" y="116" class="title">A plan-centered loop your agent can run and you can review</text>
  <text x="72" y="150" class="small">Talk to an agent. It turns your objective into a living PLAN.md, works against it, and exits only when final objectives are satisfied.</text>

  <rect x="58" y="176" width="1284" height="600" rx="24" class="panel"/>

  <text x="96" y="218" class="section">USER-FACING ENTRY</text>
  <rect x="96" y="330" width="244" height="120" rx="12" class="entry"/>
  <text x="124" y="366" class="node-title">You + agent</text>
  <text x="124" y="396" class="node-text">describe the outcome</text>
  <text x="124" y="421" class="node-text">review the dashboard link</text>

  <rect x="392" y="202" width="760" height="476" rx="28" class="loop-frame"/>
  <text x="422" y="236" class="section">AGENT LOOP</text>

  <rect x="630" y="240" width="260" height="76" rx="12" class="work"/>
  <text x="660" y="273" class="node-title">Scheduler</text>
  <text x="660" y="297" class="node-text">chooses the next step</text>

  <rect x="650" y="362" width="220" height="118" rx="16" class="plan" filter="url(#softGlow)"/>
  <text x="690" y="408" class="plan-title">PLAN.md</text>
  <text x="682" y="438" class="node-text">tasks, objectives</text>
  <text x="682" y="461" class="node-text">reviewable truth</text>

  <rect x="910" y="320" width="200" height="82" rx="12" class="work"/>
  <text x="938" y="354" class="node-title">Agent work</text>
  <text x="938" y="380" class="node-text">writes evidence</text>

  <rect x="910" y="488" width="200" height="82" rx="12" class="work"/>
  <text x="938" y="522" class="node-title">Validate</text>
  <text x="938" y="548" class="node-text">checks evidence</text>

  <rect x="660" y="568" width="230" height="86" rx="12" class="gate"/>
  <text x="688" y="602" class="node-title">Objective gates</text>
  <text x="688" y="628" class="node-text">phase + final checks</text>

  <rect x="400" y="568" width="210" height="86" rx="12" class="expand"/>
  <text x="428" y="602" class="node-title">Plan expansion</text>
  <text x="428" y="628" class="node-text">bounded follow-up</text>

  <rect x="1180" y="558" width="130" height="98" rx="12" class="complete"/>
  <text x="1206" y="594" class="node-title">Complete</text>
  <text x="1206" y="618" class="node-title">handoff</text>
  <text x="1206" y="641" class="node-text">final exit</text>

  <rect x="510" y="704" width="500" height="66" rx="12" class="surface"/>
  <text x="540" y="732" class="node-title">Dashboard review</text>
  <text x="540" y="756" class="node-text">readable progress, evidence, and handoff state</text>

  <path d="M340 390 H508 C572 390 604 421 650 421" class="edge"/>
  <path d="M760 362 V316" class="edge"/>
  <path d="M890 278 H1010 V320" class="edge"/>
  <path d="M1010 402 V488" class="edge"/>
  <path d="M910 529 C868 529 846 568 818 568" class="edge"/>
  <path d="M760 568 V480" class="edge"/>
  <path d="M660 611 H610" class="gap-edge"/>
  <path d="M505 568 V421 H650" class="expand-edge"/>
  <text x="430" y="548" class="expand-label">patches PLAN.md</text>
  <path d="M890 628 H1180" class="exit-edge"/>
  <text x="984" y="616" class="label">final satisfied</text>
  <path d="M760 654 V704" class="review-edge"/>

  <rect x="70" y="810" width="1260" height="150" rx="18" class="path-panel"/>
  <text x="96" y="845" class="section">USER PATH</text>

  <rect x="90" y="872" width="285" height="62" rx="10" class="path-node"/>
  <text x="116" y="899" class="path-title">Brief Agent</text>
  <text x="116" y="922" class="node-text">goal, project, constraints</text>

  <rect x="400" y="872" width="285" height="62" rx="10" class="path-agent"/>
  <text x="426" y="899" class="path-title">Agent Builds Workflow</text>
  <text x="426" y="922" class="node-text">plan, objectives, dashboard</text>

  <rect x="710" y="872" width="285" height="62" rx="10" class="path-review"/>
  <text x="736" y="899" class="path-title">Review &amp; Start</text>
  <text x="736" y="922" class="node-text">approve plan and launch</text>

  <rect x="1020" y="872" width="285" height="62" rx="10" class="path-watch"/>
  <text x="1046" y="899" class="path-title">Watch Dashboard</text>
  <text x="1046" y="922" class="node-text">inspect state and handoff</text>

  <path d="M375 903H400" class="edge"/>
  <path d="M685 903H710" class="expand-edge"/>
  <path d="M995 903H1020" class="exit-edge"/>

  <rect x="70" y="990" width="1260" height="46" rx="12" class="note"/>
  <rect x="96" y="999" width="136" height="28" rx="2" class="chip"/>
  <text x="118" y="1018" class="chip-text">CORE IDEA</text>
  <text x="264" y="1018" class="small">A visible PLAN.md drives the loop: gaps expand the plan, phase objectives continue the loop, and final objectives exit to handoff.</text>
</svg>
